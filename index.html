<!DOCTYPE html>

<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>テニス練習記録アプリ</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="apple-touch-icon" href="icon.png">
</head>
<body>
    <div class="container">
        <h1>テニス練習記録アプリ</h1>

```
    <div class="form-container">
        <h2 id="formTitle">練習記録を追加</h2>
        <form id="practiceForm">
            <div class="form-group">
                <label for="date">日付:</label>
                <input type="date" id="date" required>
            </div>

            <div class="form-group">
                <label for="lessonType">レッスンタイプ:</label>
                <select id="lessonType">
                    <option value="">選択してください</option>
                    <option value="group">グループレッスン</option>
                    <option value="private">プライベートレッスン</option>
                    <option value="match">試合</option>
                </select>
            </div>

            <div class="form-group">
                <label for="content">練習内容:</label>
                <textarea id="content" required></textarea>
            </div>

            <div class="form-group">
                <label for="rating">自己評価:</label>
                <input type="number" id="rating">
            </div>

            <div class="form-group">
                <label for="comment">コーチコメント:</label>
                <textarea id="comment"></textarea>
            </div>

            <button type="submit">保存</button>
        </form>
    </div>

    <div id="recordsList"></div>
</div>

<script type="module" src="script.js"></script>
```

</body>
</html>
